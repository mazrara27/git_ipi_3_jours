<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Autoplay Full</title>
    <style>
      /* On vide la page pour que seule la vidéo existe */
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: black;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      video {
        /* "contain" assure que 100% de l'image est visible sans être rognée */
        max-width: 100%;
        max-height: 100%;
        outline: none;
      }
    </style>
  </head>
  <body>
    <video id="player" playsinline autoplay controls>
      <source src="rickroll.mp4" type="video/mp4" />
    </video>

    <script>
      const video = document.getElementById("player");

      // On tente de lancer la vidéo avec le son
      const playVideo = () => {
        video.play().catch((error) => {
          console.log("L'autoplay avec son a été bloqué par le navigateur.");
          // Si bloqué, on peut tenter de la lancer en muet comme dernier recours
          // video.muted = true;
          // video.play();
        });
      };

      window.addEventListener("load", playVideo);

      // Astuce : Si l'utilisateur clique n'importe où sur la page, on relance le son
      document.body.addEventListener(
        "click",
        () => {
          video.muted = false;
          video.play();
        },
        { once: true },
      );
    </script>
  </body>
</html>
